<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom QR Code Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
  
  <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

  <style>
    body {
      font-family: 'Chakra Petch', sans-serif;
      background-color: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #0056b3;
    }
    #canvas-container {
      margin-top: 20px;
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🎨 เครื่องมือสร้าง QR Code สุดชิค</h2>
    
    <input type="text" id="qr-data" value="https://google.com" placeholder="วางลิงก์ของคุณที่นี่...">

    <label for="dots-type">รูปแบบจุดพิกเซล:</label>
    <select id="dots-type">
      <option value="rounded">โค้งมน (Rounded)</option>
      <option value="dots">จุดวงกลม (Dots)</option>
      <option value="classy">คลาสสิกเหลี่ยมตัด (Classy)</option>
      <option value="square" selected>สี่เหลี่ยมปกติ (Square)</option>
    </select>

    <label for="qr-color">สีหลักของ QR Code:</label>
    <input type="color" id="qr-color" value="#000000">

    <button onclick="generateQR()">อัปเดต QR Code</button>
    <button onclick="downloadQR()" style="background-color: #28a745;">ดาวน์โหลดรูปภาพ</button>

    <div id="canvas-container"></div>
  </div>

  <script>
    // ตั้งค่าเริ่มต้นสำหรับ QR Code
    const qrCode = new QRCodeStyling({
      width: 250,
      height: 250,
      type: "svg",
      data: "https://google.com",
      image: "", // สามารถใส่ลิงก์รูปโลโก้ตรงกลางได้ที่นี่
      dotsOptions: {
        color: "#000000",
        type: "square"
      },
      backgroundOptions: {
        color: "#ffffff",
      },
      imageOptions: {
        crossOrigin: "anonymous",
        margin: 5
      },
      // สำคัญมาก: เลือกหมวดกู้คืนข้อมูลระดับสูงสุด (High) เพื่อให้แปะรูปหรือแต่งแล้วยังสแกนได้
      qrOptions: {
        errorCorrectionLevel: "H" 
      }
    });

    // แสดงผลครั้งแรก
    qrCode.append(document.getElementById("canvas-container"));

    // ฟังก์ชันอัปเดตเมื่อกดปุ่ม
    function generateQR() {
      const textData = document.getElementById("qr-data").value;
      const dotsType = document.getElementById("dots-type").value;
      const qrColor = document.getElementById("qr-color").value;

      qrCode.update({
        data: textData,
        dotsOptions: {
          color: qrColor,
          type: dotsType
        }
      });
    }

    // ฟังก์ชันดาวน์โหลด
    function downloadQR() {
      qrCode.download({ name: "my-custom-qrcode", extension: "png" });
    }
  </script>
</body>
</html>
